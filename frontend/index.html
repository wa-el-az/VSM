<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSM | Virtual Stock Market</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ── Auth Modal ── -->
    <div id="auth-modal" class="modal-overlay">
        <div class="glass-panel auth-panel">
            <h1 class="logo">VSM<span class="logo-dot">.</span></h1>
            <p class="subtitle">Virtual Stock Market</p>

            <div id="auth-tabs" class="tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="register">Register</button>
            </div>

            <form id="login-form" class="auth-form">
                <input type="text" id="login-username" placeholder="Username" required minlength="3" maxlength="32" autocomplete="username">
                <input type="password" id="login-password" placeholder="Password" required minlength="8" autocomplete="current-password">
                <button type="submit" class="btn btn-primary">Sign In</button>
                <p id="login-error" class="error-text"></p>
            </form>

            <form id="register-form" class="auth-form hidden">
                <input type="text" id="reg-username" placeholder="Username" required minlength="3" maxlength="32" autocomplete="username">
                <input type="password" id="reg-password" placeholder="Password (min 8 chars)" required minlength="8" autocomplete="new-password">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <p id="reg-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- ── Main App ── -->
    <div id="app" class="hidden">
        <!-- Top Bar -->
        <header class="topbar glass-panel">
            <div class="topbar-left">
                <h2 class="logo-sm">VSM<span class="logo-dot">.</span></h2>
            </div>
            <div class="topbar-center">
                <div id="market-ticker" class="ticker-strip"></div>
            </div>
            <div class="topbar-right">
                <div class="balance-display">
                    <span class="balance-label">Balance</span>
                    <span id="user-balance" class="balance-value">¤0.00</span>
                </div>
                <span id="user-name" class="username"></span>
                <button id="btn-logout" class="btn btn-sm">Logout</button>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Sidebar: Asset List -->
            <aside class="sidebar glass-panel">
                <h3 class="sidebar-title">Assets</h3>
                <div id="asset-list" class="asset-list"></div>

                <div class="sidebar-section">
                    <h3 class="sidebar-title">Economy</h3>
                    <div id="economy-stats" class="economy-stats"></div>
                </div>
            </aside>

            <!-- Center: Chart -->
            <main class="chart-area">
                <div class="chart-header glass-panel">
                    <div class="chart-info">
                        <span id="chart-symbol" class="chart-symbol">NOVA</span>
                        <span id="chart-price" class="chart-price">$0.00</span>
                        <span id="chart-change" class="chart-change">+0.00%</span>
                    </div>
                    <div class="chart-controls">
                        <button class="btn btn-xs zoom-btn active" data-zoom="1D">1D</button>
                        <button class="btn btn-xs zoom-btn" data-zoom="1W">1W</button>
                        <button class="btn btn-xs zoom-btn" data-zoom="1M">1M</button>
                        <button class="btn btn-xs zoom-btn" data-zoom="1Y">1Y</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="price-chart"></canvas>
                </div>
            </main>

            <!-- Right Panel: Trading + Portfolio -->
            <aside class="trading-panel glass-panel">
                <!-- Trade Form -->
                <div class="trade-section">
                    <h3 class="sidebar-title">Trade</h3>
                    <div class="trade-tabs">
                        <button class="trade-tab active" data-side="buy">Buy</button>
                        <button class="trade-tab" data-side="sell">Sell</button>
                    </div>
                    <form id="trade-form">
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" id="trade-qty" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>Order Type</label>
                            <select id="trade-type">
                                <option value="market">Market</option>
                                <option value="limit">Limit</option>
                            </select>
                        </div>
                        <div class="form-group hidden" id="limit-price-group">
                            <label>Limit Price</label>
                            <input type="number" id="trade-limit-price" step="0.01" min="0.01">
                        </div>
                        <div class="trade-summary">
                            <span>Est. Total:</span>
                            <span id="trade-total">¤0.00</span>
                        </div>
                        <button type="submit" id="trade-submit" class="btn btn-primary btn-full">Buy NOVA</button>
                        <p id="trade-error" class="error-text"></p>
                        <p id="trade-success" class="success-text"></p>
                    </form>
                </div>

                <!-- Portfolio -->
                <div class="portfolio-section">
                    <h3 class="sidebar-title">Portfolio</h3>
                    <div id="portfolio-list" class="portfolio-list"></div>
                </div>

                <!-- PoW Faucet -->
                <div class="faucet-section">
                    <h3 class="sidebar-title">Earn (PoW)</h3>
                    <div class="faucet-tiers">
                        <button class="btn btn-sm btn-faucet" data-tier="1">Easy (¤50-100)</button>
                        <button class="btn btn-sm btn-faucet" data-tier="2">Medium (¤200-500)</button>
                        <button class="btn btn-sm btn-faucet" data-tier="3">Hard (¤1K-2.5K)</button>
                    </div>
                    <div id="task-challenge" class="task-challenge hidden">
                        <p id="task-question" class="task-question"></p>
                        <input type="number" id="task-answer" step="any" placeholder="Your answer">
                        <button id="task-submit" class="btn btn-primary btn-sm">Submit</button>
                        <p id="task-timer" class="task-timer"></p>
                        <p id="task-result" class="task-result"></p>
                    </div>
                </div>
            </aside>
        </div>

        <!-- News Ticker -->
        <footer class="news-bar glass-panel">
            <span class="news-label">NEWS</span>
            <div id="news-ticker" class="news-ticker">
                <span>Market is open. Welcome to Virtual Stock Market.</span>
            </div>
        </footer>
    </div>

    <script src="js/canvas_renderer.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
