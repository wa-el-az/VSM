upstream backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name stock.local;

    # --- Static Assets ---
    location /static {
        alias /var/www/stock.wael.work.gd/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;
    }

    # --- WebSocket Endpoint (RFC 6455 Upgrade) ---
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade handshake
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve client identity
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 24-hour timeout — prevents Nginx from closing idle WS connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Buffer tuning for low-latency message relay
        proxy_buffering off;
        proxy_buffer_size 4k;
    }

    # --- REST API ---
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- Root / Frontend Entry ---
    location / {
        root /var/www/stock.wael.work.gd/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Security Headers ---
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # --- Logging ---
    access_log /var/log/nginx/stock_access.log;
    error_log /var/log/nginx/stock_error.log warn;
}
